name: Deploy site

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtnh-factory-flow-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy site to exotiserver
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t gtnh-factory-flow-site:ci -f tools/dataset-pipeline/docker/Dockerfile .

      - name: Build and activate release
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main)
              deploy_name="gtnh-factory-flow"
              port="8580"
              ;;
            develop)
              deploy_name="gtnh-factory-flow-dev"
              port="8581"
              ;;
            *)
              echo "Unsupported deploy branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          release_sha="$(git rev-parse --short=10 HEAD)"
          app_root="$HOME/apps/$deploy_name"
          dataset_root="$HOME/data/gtnh-factory-flow/datasets/gtnh"
          release_dir="$app_root/releases/$release_sha"
          service_file="$HOME/.config/systemd/user/$deploy_name.service"
          analytics_env_file="$app_root/analytics.env"

          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          git archive --format=tar HEAD | tar -xf - -C "$release_dir"
          touch "$analytics_env_file"

          mkdir -p "$(dirname "$dataset_root")"
          if [ ! -f "$dataset_root/datasets.manifest.json" ] && [ -d "$app_root/current/public/datasets/gtnh" ]; then
            echo "Bootstrapping persistent dataset volume from current release."
            cp -aL "$app_root/current/public/datasets/gtnh" "$dataset_root"
          fi

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            --env-file "$analytics_env_file" \
            -v "$release_dir:/workspace" \
            -w /workspace \
            gtnh-factory-flow-site:ci \
            bash -lc 'npm install && npm run build'

          mkdir -p "$release_dir/public/datasets"
          rm -rf "$release_dir/public/datasets/gtnh"
          ln -s "$dataset_root" "$release_dir/public/datasets/gtnh"

          ln -sfn "$release_dir" "$app_root/current.next"
          mv -Tf "$app_root/current.next" "$app_root/current"

          mkdir -p "$HOME/.config/systemd/user"
          cat > "$service_file" <<EOF
          [Unit]
          Description=GTNH Factory Flow (${GITHUB_REF_NAME}) Next.js app
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=$app_root/current
          Environment=NODE_ENV=production
          Environment=PORT=$port
          Environment=GTNH_PREWARM_ALL_DATASETS=1
          ExecStart=/usr/bin/npm run start -- --hostname 0.0.0.0 --port $port
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          EOF

          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
          systemctl --user daemon-reload
          systemctl --user enable --now "$deploy_name.service"
          systemctl --user restart "$deploy_name.service"
          systemctl --user --no-pager --full status "$deploy_name.service"

          if [ -f "$dataset_root/datasets.manifest.json" ]; then
            manifest_url="http://127.0.0.1:$port/datasets/gtnh/datasets.manifest.json"
            manifest=""
            for _ in $(seq 1 60); do
              if manifest="$(curl -fsS "$manifest_url" 2>/dev/null)"; then
                break
              fi
              sleep 1
            done
            if [ -z "$manifest" ]; then
              manifest="$(curl -fsS "$manifest_url")"
            fi
            stable_version="$(printf '%s' "$manifest" | grep -o '"latestStableVersion"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"latestStableVersion"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || true)"
            daily_version="$(printf '%s' "$manifest" | grep -o '"latestDailyVersion"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"latestDailyVersion"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || true)"
            prewarmed_versions=""
            for dataset_version in "$stable_version" "$daily_version"; do
              [ -n "$dataset_version" ] || continue
              case " $prewarmed_versions " in
                *" $dataset_version "*) continue ;;
              esac
              prewarmed_versions="$prewarmed_versions $dataset_version"
              echo "Prewarming dataset $dataset_version on $deploy_name"
              curl -fsS --max-time 300 --retry 3 --retry-delay 1 --retry-connrefused \
                "http://127.0.0.1:$port/api/datasets/$dataset_version/prewarm" >/dev/null
            done
          fi

          if [ -f "$dataset_root/datasets.manifest.json" ]; then
            for existing_release in "$app_root"/releases/*; do
              [ -d "$existing_release" ] || continue
              mkdir -p "$existing_release/public/datasets"
              rm -rf "$existing_release/public/datasets/gtnh"
              ln -s "$dataset_root" "$existing_release/public/datasets/gtnh"
            done
          fi

          find "$app_root/releases" -mindepth 1 -maxdepth 1 -type d ! -name "$release_sha" -printf '%T@ %p\n' \
            | sort -nr \
            | tail -n +4 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
