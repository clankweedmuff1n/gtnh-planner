name: Deploy Umami

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtnh-factory-flow-umami
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Umami analytics to exotiserver
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    steps:
      - uses: actions/checkout@v4

      - name: Start Umami
        run: |
          set -euo pipefail

          umami_root="$HOME/apps/gtnh-factory-flow-umami"
          env_file="$umami_root/.env"
          compose_file="$umami_root/docker-compose.yml"
          mkdir -p "$umami_root"

          if [ ! -f "$env_file" ]; then
            postgres_password="$(openssl rand -hex 24)"
            app_secret="$(openssl rand -hex 32)"
            {
              printf 'POSTGRES_DB=umami\n'
              printf 'POSTGRES_USER=umami\n'
              printf 'POSTGRES_PASSWORD=%s\n' "$postgres_password"
              printf 'APP_SECRET=%s\n' "$app_secret"
              printf 'UMAMI_PORT=8582\n'
              printf 'TRACKER_SCRIPT_NAME=gtnh-stats.js\n'
            } > "$env_file"
          fi

          set_env_var() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "$env_file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$env_file"
            else
              printf '%s=%s\n' "$key" "$value" >> "$env_file"
            fi
          }

          set_env_var BASE_PATH /umami
          set_env_var FAVICON_URL https://gtnh.samiracle.fr/site-icon.png

          cp tools/umami/docker-compose.yml "$compose_file"

          cd "$umami_root"
          docker compose pull db
          docker compose build umami
          docker compose up -d
          docker compose ps

          umami_port="$(grep '^UMAMI_PORT=' "$env_file" | cut -d= -f2)"
          umami_url="http://127.0.0.1:${umami_port}"
          website_id="9c3d7d5b-462b-40f0-9738-f4566f771f49"
          prod_analytics_env="$HOME/apps/gtnh-factory-flow/analytics.env"

          for attempt in $(seq 1 30); do
            if curl -fsS "$umami_url/umami" >/dev/null; then
              break
            fi
            sleep 2
          done

          mkdir -p "$(dirname "$prod_analytics_env")"
          {
            printf 'NEXT_PUBLIC_UMAMI_SCRIPT_URL=/_umami/gtnh-stats.js\n'
            printf 'NEXT_PUBLIC_UMAMI_HOST_URL=/_umami\n'
            printf 'NEXT_PUBLIC_UMAMI_WEBSITE_ID=%s\n' "$website_id"
          } > "$prod_analytics_env"

          login_response="$(
            curl -fsS -X POST "$umami_url/umami/api/auth/login" \
              -H 'Content-Type: application/json' \
              --data '{"username":"admin","password":"umami"}' || true
          )"
          token="$(printf '%s' "$login_response" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"

          if [ -n "$token" ]; then
            curl -fsS -X POST "$umami_url/umami/api/websites" \
              -H "Authorization: Bearer $token" \
              -H 'Content-Type: application/json' \
              --data "{\"id\":\"$website_id\",\"name\":\"GTNH Planner\",\"domain\":\"gtnh.samiracle.fr\"}" \
              >/dev/null || true
          else
            echo "Could not log in with the initial admin credentials; assuming the website exists or will be created manually."
          fi

          echo "Umami is listening on port ${umami_port}."
          echo "Prod analytics env written to $prod_analytics_env."
          echo "Initial credentials are admin / umami. Change the password after first login."
