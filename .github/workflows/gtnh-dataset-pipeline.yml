name: GTNH dataset pipeline

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Dataset channel to process"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - stable
          - daily
      publish:
        description: "Commit generated datasets to this repository"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "35 5 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: gtnh-dataset-pipeline
  cancel-in-progress: false

jobs:
  detect:
    name: Detect GTNH versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_versions: ${{ steps.detect.outputs.has_versions }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel || 'both' }}
        run: node tools/dataset-pipeline/scripts/detect-gtnh-versions.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: detected-gtnh-versions
          path: .pipeline/detected-versions.json

  build:
    name: Build ${{ matrix.channel }} dataset
    needs: detect
    if: needs.detect.outputs.has_versions == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - run: npm install

      - name: Prepare headless client runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git unzip xvfb xauth libegl1 libgl1 libgl1-mesa-dri libglx-mesa0 mesa-utils

      - uses: actions/download-artifact@v4
        with:
          name: detected-gtnh-versions
          path: .pipeline

      - name: Generate normalized dataset
        timeout-minutes: 180
        env:
          GTNH_CHANNEL: ${{ matrix.channel }}
          GTNH_VERSION_ID: ${{ matrix.id }}
          GTNH_VERSION_LABEL: ${{ matrix.gtnhVersion }}
          GTNH_SOURCE_KIND: ${{ matrix.sourceKind }}
          GTNH_SOURCE_REF: ${{ matrix.sourceRef }}
          GTNH_SOURCE_URL: ${{ matrix.sourceUrl }}
          GTNH_CLIENT_EXPORT_COMMAND: ${{ secrets.GTNH_CLIENT_EXPORT_COMMAND }}
          GTNH_EXPORT_MAX_MEMORY: "6G"
          GTNH_EXPORT_TIMEOUT_SECONDS: "10800"
          GTNH_EXPORT_PACK_KIND: "client"
          GTNH_RENDER_STACK_ICONS: "true"
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/dataset-pipeline/scripts/generate-dataset.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gtnh-export-logs-${{ matrix.id }}
          path: |
            .pipeline/raw-export/${{ matrix.id }}/*.log
            .pipeline/raw-export/${{ matrix.id }}/recex-export.json
            .pipeline/raw-export/${{ matrix.id }}/rendered-icons/*.png
            .pipeline/${{ matrix.id }}.pipeline.json

      - name: Stage dataset artifact
        run: |
          mkdir -p .pipeline/dataset-artifact/${{ matrix.id }}
          cp public/datasets/gtnh/${{ matrix.id }}/recipes.json.gz .pipeline/dataset-artifact/${{ matrix.id }}/recipes.json.gz
          if [ -d public/datasets/gtnh/${{ matrix.id }}/textures ]; then
            cp -R public/datasets/gtnh/${{ matrix.id }}/textures .pipeline/dataset-artifact/${{ matrix.id }}/textures
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: gtnh-dataset-${{ matrix.id }}
          path: |
            .pipeline/dataset-artifact/

  publish:
    name: Publish generated datasets
    needs: build
    if: ${{ needs.build.result == 'success' && (github.event_name == 'schedule' || inputs.publish == true) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: gtnh-dataset-*
          merge-multiple: true
          path: .pipeline/downloaded-datasets

      - name: Stage downloaded datasets
        run: |
          mkdir -p public/datasets/gtnh
          if [ -d .pipeline/downloaded-datasets/public/datasets/gtnh ]; then
            cp -R .pipeline/downloaded-datasets/public/datasets/gtnh/. public/datasets/gtnh/
          else
            cp -R .pipeline/downloaded-datasets/. public/datasets/gtnh/
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Rebuild dataset manifest
        run: node tools/dataset-pipeline/scripts/rebuild-manifest.mjs

      - name: Commit dataset updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/datasets/gtnh
          if git diff --cached --quiet -- public/datasets/gtnh; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git commit -m "Update GTNH datasets"
          git push
