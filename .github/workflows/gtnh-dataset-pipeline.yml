name: GTNH dataset pipeline

on:
  repository_dispatch:
    types:
      - gtnh-daily-published
      - gtnh-stable-published
      - gtnh-version-published
  workflow_dispatch:
    inputs:
      channel:
        description: "Dataset channel to process"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - stable
          - daily
      publish:
        description: "Publish generated datasets to the exotiserver dataset volume"
        required: true
        default: false
        type: boolean
      force_rebuild:
        description: "Rebuild and publish selected datasets even if they are already published"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "35 5 * * *"
    - cron: "*/30 * * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: gtnh-dataset-pipeline
  cancel-in-progress: false

jobs:
  detect:
    name: Detect GTNH versions
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_versions: ${{ steps.detect.outputs.has_versions }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHANNEL: ${{ github.event.client_payload.channel || (github.event.action == 'gtnh-daily-published' && 'daily') || (github.event.action == 'gtnh-stable-published' && 'stable') || inputs.channel || 'both' }}
          FORCE_REBUILD: ${{ github.event.client_payload.force_rebuild || inputs.force_rebuild || false }}
        run: GTNH_DATASETS_ROOT="$HOME/data/gtnh-factory-flow/datasets/gtnh" node tools/dataset-pipeline/scripts/detect-gtnh-versions.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: detected-gtnh-versions
          path: .pipeline/detected-versions.json

  build:
    name: Build ${{ matrix.channel }} dataset
    needs: detect
    if: needs.detect.outputs.has_versions == 'true'
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: detected-gtnh-versions
          path: .pipeline

      - name: Build dataset Docker image
        run: docker build -t gtnh-factory-flow-dataset:ci -f tools/dataset-pipeline/docker/Dockerfile .

      - name: Generate normalized dataset
        timeout-minutes: 360
        env:
          GTNH_CHANNEL: ${{ matrix.channel }}
          GTNH_VERSION_ID: ${{ matrix.id }}
          GTNH_VERSION_LABEL: ${{ matrix.gtnhVersion }}
          GTNH_SOURCE_KIND: ${{ matrix.sourceKind }}
          GTNH_SOURCE_REF: ${{ matrix.sourceRef }}
          GTNH_SOURCE_URL: ${{ matrix.sourceUrl }}
          GTNH_CLIENT_EXPORT_COMMAND: ${{ secrets.GTNH_CLIENT_EXPORT_COMMAND }}
          GTNH_EXPORT_MAX_MEMORY: "6G"
          GTNH_EXPORT_TIMEOUT_SECONDS: "21600"
          GTNH_EXPORT_PACK_KIND: "client"
          GTNH_RENDER_STACK_ICONS: "true"
          GTNH_ATLAS_ICON_SIZE: "256"
          GTNH_ATLAS_MAX_SIZE: "8192"
          GTNH_EXPORT_DISABLE_CLIENT_UI_MODS: "true"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          staging_root="$HOME/data/gtnh-factory-flow/staging/${GITHUB_RUN_ID}/datasets/gtnh"
          icon_cache_root="$HOME/data/gtnh-factory-flow/icon-cache/${GTNH_ATLAS_ICON_SIZE}"
          rm -rf "$staging_root/${GTNH_VERSION_ID}"
          mkdir -p "$staging_root"
          mkdir -p "$icon_cache_root"
          container_name="gtnh-export-${GTNH_VERSION_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          docker ps -aq --filter "name=^/gtnh-export-" | xargs -r docker rm -f
          trap 'docker rm -f "$container_name" >/dev/null 2>&1 || true' EXIT INT TERM

          docker run --rm \
            --name "$container_name" \
            --user "$(id -u):$(id -g)" \
            --shm-size=2g \
            --memory=10g \
            --memory-swap=12g \
            --cpus=8 \
            -e HOME=/tmp \
            -e GITHUB_TOKEN \
            -e GTNH_CHANNEL \
            -e GTNH_VERSION_ID \
            -e GTNH_VERSION_LABEL \
            -e GTNH_SOURCE_KIND \
            -e GTNH_SOURCE_REF \
            -e GTNH_SOURCE_URL \
            -e GTNH_CLIENT_EXPORT_COMMAND \
            -e GTNH_EXPORT_MAX_MEMORY \
            -e GTNH_EXPORT_TIMEOUT_SECONDS \
            -e GTNH_EXPORT_PACK_KIND \
            -e GTNH_RENDER_STACK_ICONS \
            -e GTNH_ATLAS_ICON_SIZE \
            -e GTNH_ATLAS_MAX_SIZE \
            -e NODE_OPTIONS=--max-old-space-size=8192 \
            -e GTNH_ICON_CACHE_DIR=/icon-cache \
            -e GTNH_EXPORT_DISABLE_CLIENT_UI_MODS \
            -e GTNH_DATASETS_ROOT=/datasets \
            -v "$staging_root:/datasets" \
            -v "$icon_cache_root:/icon-cache" \
            -v "$PWD:/workspace" \
            -w /workspace \
            gtnh-factory-flow-dataset:ci \
            bash -lc 'npm install && node tools/dataset-pipeline/scripts/generate-dataset.mjs'

      - name: Cleanup GTNH export containers
        if: always()
        continue-on-error: true
        env:
          GTNH_VERSION_ID: ${{ matrix.id }}
        run: |
          current_container="gtnh-export-${GTNH_VERSION_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker rm -f "$current_container" >/dev/null 2>&1 || true
          docker ps -aq --filter "name=^/gtnh-export-" | xargs -r docker rm -f

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: gtnh-export-logs-${{ matrix.id }}
          path: |
            .pipeline/raw-export/${{ matrix.id }}/*.log
            .pipeline/raw-export/${{ matrix.id }}/rendered-icons/*.json
            .pipeline/${{ matrix.id }}.pipeline.json
          if-no-files-found: warn

  publish:
    name: Publish generated datasets
    needs: build
    if: ${{ needs.build.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || inputs.publish == true || inputs.force_rebuild == true) }}
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: detected-gtnh-versions
          path: .pipeline

      - name: Publish staged datasets to persistent volume
        run: |
          set -euo pipefail
          dataset_root="$HOME/data/gtnh-factory-flow/datasets/gtnh"
          staging_root="$HOME/data/gtnh-factory-flow/staging/${GITHUB_RUN_ID}/datasets/gtnh"
          mkdir -p "$dataset_root"

          mapfile -t versions < <(
            node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('.pipeline/detected-versions.json','utf8')); for (const v of data.detected) console.log(v.channel + '\t' + v.id)"
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No generated dataset versions to publish."
            exit 0
          fi

          has_daily=false
          for line in "${versions[@]}"; do
            IFS=$'\t' read -r channel version_id <<<"$line"
            source_dir="$staging_root/$version_id"
            incoming_dir="$dataset_root/.incoming-$version_id"
            if [ ! -d "$source_dir" ]; then
              echo "Missing staged dataset: $source_dir" >&2
              exit 1
            fi
            if [ "$channel" = "daily" ]; then
              has_daily=true
            fi
            rm -rf "$incoming_dir"
            cp -a "$source_dir" "$incoming_dir"
          done

          if [ "$has_daily" = "true" ]; then
            find "$dataset_root" -mindepth 1 -maxdepth 1 -type d -name 'daily-*' -exec rm -rf {} +
          fi

          for line in "${versions[@]}"; do
            IFS=$'\t' read -r _channel version_id <<<"$line"
            rm -rf "$dataset_root/$version_id"
            mv "$dataset_root/.incoming-$version_id" "$dataset_root/$version_id"
          done

      - name: Rebuild dataset manifest
        run: |
          dataset_root="$HOME/data/gtnh-factory-flow/datasets/gtnh"
          docker build -t gtnh-factory-flow-dataset:ci -f tools/dataset-pipeline/docker/Dockerfile .
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GTNH_DATASETS_ROOT=/datasets \
            -v "$dataset_root:/datasets" \
            -v "$PWD:/workspace" \
            -w /workspace \
            gtnh-factory-flow-dataset:ci \
            node tools/dataset-pipeline/scripts/rebuild-manifest.mjs

      - name: Cleanup dataset staging
        if: always()
        run: |
          rm -rf "$HOME/data/gtnh-factory-flow/staging/${GITHUB_RUN_ID}"

  deploy:
    name: Deploy site to exotiserver
    needs: publish
    if: ${{ needs.publish.result == 'success' }}
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout latest published main
        run: |
          git fetch origin main
          git checkout --detach origin/main
          git log -1 --oneline

      - name: Build Docker image
        run: docker build -t gtnh-factory-flow-site:ci -f tools/dataset-pipeline/docker/Dockerfile .

      - name: Build and activate release
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse --short=10 HEAD)"
          app_root="$HOME/apps/gtnh-factory-flow"
          dataset_root="$HOME/data/gtnh-factory-flow/datasets/gtnh"
          release_dir="$app_root/releases/$release_sha"
          service_file="$HOME/.config/systemd/user/gtnh-factory-flow.service"
          analytics_env_file="$app_root/analytics.env"

          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          git archive --format=tar HEAD | tar -xf - -C "$release_dir"
          touch "$analytics_env_file"

          mkdir -p "$dataset_root"

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            --env-file "$analytics_env_file" \
            -v "$release_dir:/workspace" \
            -w /workspace \
            gtnh-factory-flow-site:ci \
            bash -lc 'npm install && npm run build'

          mkdir -p "$release_dir/public/datasets"
          rm -rf "$release_dir/public/datasets/gtnh"
          ln -s "$dataset_root" "$release_dir/public/datasets/gtnh"

          ln -sfn "$release_dir" "$app_root/current.next"
          mv -Tf "$app_root/current.next" "$app_root/current"

          mkdir -p "$HOME/.config/systemd/user"
          cat > "$service_file" <<EOF
          [Unit]
          Description=GTNH Factory Flow (main) Next.js app
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=$app_root/current
          Environment=NODE_ENV=production
          Environment=PORT=8580
          Environment=GTNH_PREWARM_ALL_DATASETS=1
          ExecStart=/usr/bin/npm run start -- --hostname 0.0.0.0 --port 8580
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          EOF

          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
          systemctl --user daemon-reload
          systemctl --user enable --now gtnh-factory-flow.service
          systemctl --user restart gtnh-factory-flow.service
          systemctl --user --no-pager --full status gtnh-factory-flow.service

          if [ -f "$dataset_root/datasets.manifest.json" ]; then
            manifest_url="http://127.0.0.1:8580/datasets/gtnh/datasets.manifest.json"
            manifest=""
            for _ in $(seq 1 60); do
              if manifest="$(curl -fsS "$manifest_url" 2>/dev/null)"; then
                break
              fi
              sleep 1
            done
            if [ -z "$manifest" ]; then
              manifest="$(curl -fsS "$manifest_url")"
            fi
            stable_version="$(printf '%s' "$manifest" | grep -o '"latestStableVersion"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"latestStableVersion"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || true)"
            daily_version="$(printf '%s' "$manifest" | grep -o '"latestDailyVersion"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"latestDailyVersion"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' || true)"
            prewarmed_versions=""
            for dataset_version in "$stable_version" "$daily_version"; do
              [ -n "$dataset_version" ] || continue
              case " $prewarmed_versions " in
                *" $dataset_version "*) continue ;;
              esac
              prewarmed_versions="$prewarmed_versions $dataset_version"
              echo "Prewarming dataset $dataset_version on main"
              curl -fsS --max-time 300 --retry 3 --retry-delay 1 --retry-connrefused \
                "http://127.0.0.1:8580/api/datasets/$dataset_version/prewarm" >/dev/null
            done
          fi

          if [ -f "$dataset_root/datasets.manifest.json" ]; then
            for existing_release in "$app_root"/releases/*; do
              [ -d "$existing_release" ] || continue
              mkdir -p "$existing_release/public/datasets"
              rm -rf "$existing_release/public/datasets/gtnh"
              ln -s "$dataset_root" "$existing_release/public/datasets/gtnh"
            done
          fi

          find "$app_root/releases" -mindepth 1 -maxdepth 1 -type d ! -name "$release_sha" -printf '%T@ %p\n' \
            | sort -nr \
            | tail -n +4 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
