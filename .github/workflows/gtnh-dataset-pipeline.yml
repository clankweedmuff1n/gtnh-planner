name: GTNH dataset pipeline

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Dataset channel to process"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - stable
          - daily
      publish:
        description: "Commit generated datasets to this repository"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "35 5 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: gtnh-dataset-pipeline
  cancel-in-progress: false

jobs:
  detect:
    name: Detect GTNH versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_versions: ${{ steps.detect.outputs.has_versions }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel || 'both' }}
        run: node tools/dataset-pipeline/scripts/detect-gtnh-versions.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: detected-gtnh-versions
          path: .pipeline/detected-versions.json

  build:
    name: Build ${{ matrix.channel }} dataset
    needs: detect
    if: needs.detect.outputs.has_versions == 'true'
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: detected-gtnh-versions
          path: .pipeline

      - name: Build dataset Docker image
        run: docker build -t gtnh-factory-flow-dataset:ci -f tools/dataset-pipeline/docker/Dockerfile .

      - name: Generate normalized dataset
        timeout-minutes: 360
        env:
          GTNH_CHANNEL: ${{ matrix.channel }}
          GTNH_VERSION_ID: ${{ matrix.id }}
          GTNH_VERSION_LABEL: ${{ matrix.gtnhVersion }}
          GTNH_SOURCE_KIND: ${{ matrix.sourceKind }}
          GTNH_SOURCE_REF: ${{ matrix.sourceRef }}
          GTNH_SOURCE_URL: ${{ matrix.sourceUrl }}
          GTNH_CLIENT_EXPORT_COMMAND: ${{ secrets.GTNH_CLIENT_EXPORT_COMMAND }}
          GTNH_EXPORT_MAX_MEMORY: "6G"
          GTNH_EXPORT_TIMEOUT_SECONDS: "21600"
          GTNH_EXPORT_PACK_KIND: "client"
          GTNH_RENDER_STACK_ICONS: "true"
          GTNH_ATLAS_ICON_SIZE: "256"
          GTNH_ATLAS_MAX_SIZE: "8192"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          docker run --rm \
            --name "gtnh-export-${GTNH_VERSION_ID}" \
            --user "$(id -u):$(id -g)" \
            --shm-size=2g \
            --memory=10g \
            --memory-swap=12g \
            --cpus=8 \
            -e HOME=/tmp \
            -e GITHUB_TOKEN \
            -e GTNH_CHANNEL \
            -e GTNH_VERSION_ID \
            -e GTNH_VERSION_LABEL \
            -e GTNH_SOURCE_KIND \
            -e GTNH_SOURCE_REF \
            -e GTNH_SOURCE_URL \
            -e GTNH_CLIENT_EXPORT_COMMAND \
            -e GTNH_EXPORT_MAX_MEMORY \
            -e GTNH_EXPORT_TIMEOUT_SECONDS \
            -e GTNH_EXPORT_PACK_KIND \
            -e GTNH_RENDER_STACK_ICONS \
            -e GTNH_ATLAS_ICON_SIZE \
            -e GTNH_ATLAS_MAX_SIZE \
            -v "$PWD:/workspace" \
            -w /workspace \
            gtnh-factory-flow-dataset:ci \
            bash -lc 'npm install && node tools/dataset-pipeline/scripts/generate-dataset.mjs'

      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: gtnh-export-logs-${{ matrix.id }}
          path: |
            .pipeline/raw-export/${{ matrix.id }}/*.log
            .pipeline/raw-export/${{ matrix.id }}/rendered-icons/*.json
            .pipeline/${{ matrix.id }}.pipeline.json
          if-no-files-found: warn

      - name: Stage dataset artifact
        run: |
          mkdir -p .pipeline/dataset-artifact/${{ matrix.id }}
          cp public/datasets/gtnh/${{ matrix.id }}/recipes.json.gz .pipeline/dataset-artifact/${{ matrix.id }}/recipes.json.gz
          cp public/datasets/gtnh/${{ matrix.id }}/resource-index.json.gz .pipeline/dataset-artifact/${{ matrix.id }}/resource-index.json.gz
          cp public/datasets/gtnh/${{ matrix.id }}/recipe-index.json.gz .pipeline/dataset-artifact/${{ matrix.id }}/recipe-index.json.gz
          if [ -d public/datasets/gtnh/${{ matrix.id }}/recipes-shards ]; then
            cp -R public/datasets/gtnh/${{ matrix.id }}/recipes-shards .pipeline/dataset-artifact/${{ matrix.id }}/recipes-shards
          fi
          if [ -d public/datasets/gtnh/${{ matrix.id }}/textures ]; then
            cp -R public/datasets/gtnh/${{ matrix.id }}/textures .pipeline/dataset-artifact/${{ matrix.id }}/textures
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: gtnh-dataset-${{ matrix.id }}
          path: |
            .pipeline/dataset-artifact/

  publish:
    name: Publish generated datasets
    needs: build
    if: ${{ needs.build.result == 'success' && (github.event_name == 'schedule' || inputs.publish == true) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: gtnh-dataset-*
          merge-multiple: true
          path: .pipeline/downloaded-datasets

      - name: Stage downloaded datasets
        run: |
          mkdir -p public/datasets/gtnh

          source_root=".pipeline/downloaded-datasets"
          if [ -d "$source_root/public/datasets/gtnh" ]; then
            source_root="$source_root/public/datasets/gtnh"
          fi

          if find "$source_root" -mindepth 1 -maxdepth 1 -type d -name 'daily-*' | grep -q .; then
            find public/datasets/gtnh -mindepth 1 -maxdepth 1 -type d -name 'daily-*' -exec rm -rf {} +
          fi

          cp -R "$source_root"/. public/datasets/gtnh/

      - name: Rebuild dataset manifest
        run: |
          docker build -t gtnh-factory-flow-dataset:ci -f tools/dataset-pipeline/docker/Dockerfile .
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/workspace" \
            -w /workspace \
            gtnh-factory-flow-dataset:ci \
            node tools/dataset-pipeline/scripts/rebuild-manifest.mjs

      - name: Commit dataset updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/datasets/gtnh
          if git diff --cached --quiet -- public/datasets/gtnh; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git commit -m "Update GTNH datasets"
          git pull --rebase origin main
          git push

  deploy:
    name: Deploy site to exotiserver
    needs: publish
    if: ${{ needs.publish.result == 'success' }}
    runs-on: [self-hosted, Linux, X64, gtnh-export]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout latest published main
        run: |
          git fetch origin main
          git checkout --detach origin/main
          git log -1 --oneline

      - name: Build Docker image
        run: docker build -t gtnh-factory-flow-site:ci -f tools/dataset-pipeline/docker/Dockerfile .

      - name: Build and activate release
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse --short=10 HEAD)"
          app_root="$HOME/apps/gtnh-factory-flow"
          release_dir="$app_root/releases/$release_sha"

          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          git archive --format=tar HEAD | tar -xf - -C "$release_dir"

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$release_dir:/workspace" \
            -w /workspace \
            gtnh-factory-flow-site:ci \
            bash -lc 'npm install && npm run build'

          ln -sfn "$release_dir" "$app_root/current.next"
          mv -Tf "$app_root/current.next" "$app_root/current"
          systemctl --user restart gtnh-factory-flow.service
          systemctl --user --no-pager --full status gtnh-factory-flow.service

          find "$app_root/releases" -mindepth 1 -maxdepth 1 -type d ! -name "$release_sha" -printf '%T@ %p\n' \
            | sort -nr \
            | tail -n +4 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
