# Full self-hosted stack: the Next.js app + the realtime collaboration server.
# A host reverse proxy (nginx) terminates TLS and forwards to these containers,
# so ports are bound to localhost only.
#
# Configure via a .env file next to this one (see .env.deploy.example), then:
#   docker compose up -d --build
services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        # NEXT_PUBLIC_* are baked in at build time.
        NEXT_PUBLIC_COLLAB_WS_URL: ${NEXT_PUBLIC_COLLAB_WS_URL:-}
        NEXT_PUBLIC_GTNH_DATASET_MANIFEST_URL: ${NEXT_PUBLIC_GTNH_DATASET_MANIFEST_URL:-/datasets/gtnh/datasets.manifest.json}
        # The dataset is downloaded and baked into the image at build time.
        DATASET_SOURCE: ${DATASET_SOURCE:-https://dev-gtnh.samiracle.fr}
        DATASET_VERSION: ${DATASET_VERSION:-stable-2.8.4}
    image: gtnh-factory-flow-app
    environment:
      # Leave empty: the image already contains the dataset. Set a URL only if you want
      # to override the baked-in data and proxy from another deployment instead.
      - GTNH_DATASET_BACKEND_URL=${GTNH_DATASET_BACKEND_URL:-}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  collab:
    build:
      context: .
      dockerfile: docker/collab/Dockerfile
    image: gtnh-factory-flow-collab
    ports:
      - "127.0.0.1:1234:1234"
    restart: unless-stopped
